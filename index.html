<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A question for Nermin 💕</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #ffd6e8, #e0c3fc, #ffd6e8);
    background-size: 300% 300%;
    animation: gradientShift 10s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .flower {
    position: absolute;
    font-size: 22px;
    opacity: 0.6;
    animation: float 6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(15deg); }
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 40px 32px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(200, 100, 180, 0.3);
    position: relative;
    z-index: 10;
  }
  .avatar {
    width: 100px;
    height: 100px;
    border-radius: 20px;
    background: linear-gradient(135deg, #ffb6d5, #c9a7ff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    margin: 0 auto 20px;
  }
  h1 {
    color: #7a2e5e;
    font-size: 26px;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  p.sub {
    color: #a06090;
    font-size: 15px;
    margin-bottom: 24px;
  }
  .btn-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    position: relative;
    height: 60px;
    align-items: center;
  }
  button {
    border: none;
    border-radius: 999px;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s ease;
  }
  #yesBtn {
    background: linear-gradient(135deg, #ff5f96, #ff2f78);
    color: white;
  }
  #yesBtn:hover { transform: scale(1.08); }
  #noBtn {
    background: linear-gradient(135deg, #b98cf5, #9a6be0);
    color: white;
    position: absolute;
    right: 0;
    top: 12px;
  }
  input[type="date"], input[type="time"] {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 2px solid #f0c6de;
    font-size: 15px;
    margin-bottom: 16px;
    font-family: inherit;
    color: #7a2e5e;
  }
  label {
    display: block;
    text-align: left;
    color: #a06090;
    font-size: 13px;
    margin-bottom: 6px;
    font-weight: bold;
  }
  .field { margin-bottom: 16px; }
  #submitBtn {
    background: linear-gradient(135deg, #ff5f96, #ff2f78);
    color: white;
    width: 100%;
    margin-top: 8px;
  }
  #submitBtn:hover { transform: scale(1.03); }
  .screen { display: none; }
  .screen.active { display: block; }
  .confetti {
    position: fixed;
    top: -20px;
    font-size: 20px;
    pointer-events: none;
    animation: fall linear forwards;
    z-index: 5;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); opacity: 0.3; }
  }
  .summary {
    background: #fdeef6;
    border-radius: 14px;
    padding: 16px;
    margin-top: 20px;
    color: #7a2e5e;
    font-size: 15px;
  }
</style>
</head>
<body>

<div class="card">

  <!-- SCREEN 1: THE QUESTION -->
  <div class="screen active" id="screen1">
    <div class="avatar">🥹</div>
    <h1>🌸 Nermin, will you go on a date with me? 🌸</h1>
    <p class="sub">Think carefully... 👀</p>
    <div class="btn-row">
      <button id="yesBtn" onclick="goTo('screen2')">YES ♥</button>
      <button id="noBtn">no 🐾</button>
    </div>
  </div>

  <!-- SCREEN 2: PICK A DAY -->
  <div class="screen" id="screen2">
    <div class="avatar">📅🐾</div>
    <h1>So... when are you free?</h1>
    <p class="sub">Pick the day and time that work for you</p>
    <div class="field">
      <label>Pick a day 📅</label>
      <input type="date" id="dateInput">
    </div>
    <div class="field">
      <label>Pick a time 🕐</label>
      <input type="time" id="timeInput">
    </div>
    <button id="submitBtn" onclick="confirmDate()">Confirm the date! ♥</button>
  </div>

  <!-- SCREEN 3: CONFIRMATION -->
  <div class="screen" id="screen3">
    <div class="avatar">🧽❤️</div>
    <h1>WAIT YOU ACTUALLY SAID YES?? 😭</h1>
    <p class="sub">I was so ready for you to say no 😅</p>
    <div class="summary" id="summaryText"></div>
  </div>

</div>

<script>
  // Floating flowers background
  const flowers = ['🌸','💐','🌷','✨','💕'];
  for (let i = 0; i < 12; i++) {
    const f = document.createElement('div');
    f.className = 'flower';
    f.textContent = flowers[Math.floor(Math.random() * flowers.length)];
    f.style.left = Math.random() * 100 + 'vw';
    f.style.top = Math.random() * 100 + 'vh';
    f.style.animationDelay = Math.random() * 5 + 's';
    f.style.animationDuration = (5 + Math.random() * 4) + 's';
    document.body.appendChild(f);
  }

  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'screen2') launchConfetti();
  }

  function confirmDate() {
    const date = document.getElementById('dateInput').value;
    const time = document.getElementById('timeInput').value;
    if (!date || !time) {
      alert("Don't forget to pick a day AND a time! 🥺");
      return;
    }
    const d = new Date(date + 'T' + time);
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const dateStr = d.toLocaleDateString('en-US', options);
    const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('summaryText').textContent = `Date set for ${dateStr} at ${timeStr} 💖 Can't wait!`;
    goTo('screen3');
  }

  function launchConfetti() {
    const emojis = ['🎉','💖','🌸','✨','💕'];
    for (let i = 0; i < 30; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        c.style.left = Math.random() * 100 + 'vw';
        c.style.animationDuration = (2 + Math.random() * 2) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, i * 60);
    }
  }

  // The classic "no" button that runs away
  const noBtn = document.getElementById('noBtn');
  const btnRow = document.querySelector('.btn-row');
  function moveNoButton() {
    const rowRect = btnRow.getBoundingClientRect();
    const maxX = rowRect.width - noBtn.offsetWidth;
    const maxY = rowRect.height - noBtn.offsetHeight;
    const randX = Math.random() * maxX;
    const randY = Math.random() * Math.max(maxY, 0);
    noBtn.style.right = 'auto';
    noBtn.style.left = randX + 'px';
    noBtn.style.top = randY + 'px';
  }
  noBtn.addEventListener('mouseover', moveNoButton);
  noBtn.addEventListener('click', (e) => { e.preventDefault(); moveNoButton(); });
  // touch support for mobile
  noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveNoButton(); });
</script>

</body>
  </html>
